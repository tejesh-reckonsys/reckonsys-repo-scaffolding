_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

_message_after_copy: |
  Setup complete!

  Please check the README.md for next steps!

project_name:
    type: str
    help: "Project name (slug, e.g. my-service)"

project_description:
    type: str
    default: ""
    help: "One-line description of the service"

python_version:
    type: str
    default: "3.12"
    help: "Python version (e.g. 3.12, 3.13)"

use_postgres:
    type: bool
    default: false
    help: "Include PostgreSQL, SQLAlchemy async, and Alembic?"

postgres_port:
    type: int
    default: 5432
    help: "Host port to expose Postgres on"
    when: "{{ use_postgres }}"

use_worker:
    type: bool
    default: false
    help: "Include arq async worker with Redis?"

redis_port:
    type: int
    default: 6379
    help: "Host port to expose Redis on"
    when: "{{ use_worker }}"

caddy_port:
    type: int
    default: 80
    help: "Host port to expose Caddy (HTTP) on"

bare:
    type: bool
    default: false
    help: "Skip example modules (users, worker tasks); generate skeleton only"
